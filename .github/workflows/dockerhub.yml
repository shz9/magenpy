name: DockerHub

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: DockerHub repository name, for example shadizabad/magenpy
        required: false
        default: shadizabad/magenpy
        type: string
      tags:
        description: Comma-separated image version tags, for example latest,0.2.0,v0.2.0
        required: false
        default: latest
        type: string
      push_latest:
        description: Also publish the latest tag
        required: false
        default: true
        type: boolean

jobs:
  build_and_publish:
    name: Build and publish CLI image
    runs-on: ubuntu-latest
    environment: dockerhub
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: docker_tags
        shell: bash
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          INPUT_TAGS: ${{ inputs.tags }}
          PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          tags=""

          IFS=',' read -ra tag_array <<< "${INPUT_TAGS}"
          for tag in "${tag_array[@]}"; do
            tag="$(echo "${tag}" | xargs)"
            if [ -n "${tag}" ]; then
              tags="${tags}${IMAGE_NAME}:${tag}"$'\n'
            fi
          done

          if [ "${PUSH_LATEST}" = "true" ] && ! grep -qx "${IMAGE_NAME}:latest" <<< "${tags}"; then
            tags="${tags}${IMAGE_NAME}:latest"$'\n'
          fi

          if [ -z "${tags}" ]; then
            echo "At least one Docker tag is required." >&2
            exit 1
          fi

          {
            echo "tags<<EOF"
            printf "%s" "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/cli.Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            MAGENPY_INSTALL_TARGET=.
          tags: ${{ steps.docker_tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
